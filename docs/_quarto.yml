project:
  type: website

website:
  title: "sorting-hat"
  reader-mode: true
  repo-url: https://github.com/coatless-quarto/sorting-hat/
  repo-actions: [edit, issue]
  sidebar:
    logo: "sorting-hat-animated-logo.svg"
    logo-alt: "A hexagon logo for the sorting-hat extension."
    style: "floating"
    search: true
    tools:
      - icon: github
        href: https://github.com/coatless-quarto/sorting-hat/
    contents: 
      - text: "Home"
        file: index.qmd
      - section: "Demos"
        contents:
        - text: "Python Only"
          file: qsorting-hat-python-only.qmd
        - text: "Collapsed View"
          file: qsorting-hat-collapse.qmd
      - section: "Support"
        contents:
        - text: "FAQ"
          href: qsorting-hat-faq.qmd
        - text: "Submit an issue"
          href: https://github.com/coatless-quarto/sorting-hat/issues/new/choose
      - section: "Extra"
        contents:
        - qsorting-hat-release-notes.qmd

format: 
  html:
    toc: true